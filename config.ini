[server]
server_host = 0.0.0.0
server_port = 8001

[paths]
voices_dir = voices
embeddings_dir = embeddings
audio_cache_dir = audio_cache

[cache]
cache_limit = 10
cache_cleanup_interval = 300

[security]
; Comma-separated list of allowed CORS origins
; Use "*" to allow all origins (not recommended for production)
; Examples: http://localhost:3000, http://127.0.0.1:*
allowed_origins = http://localhost:*, http://127.0.0.1:*
; Rate limiting: max requests per window
rate_limit_requests = 30
; Rate limiting: window size in seconds
rate_limit_window = 60
; Enable Windows high priority mode (set to false for shared systems)
enable_high_priority = true
; Timeout for model loading in seconds
model_load_timeout = 300

[validation]
; Maximum text input length
max_input_length = 4096
; Minimum text input length  
min_input_length = 1

[audio]
queue_size = 1024
queue_timeout = 20.0
eof_timeout = 1.0
chunk_size = 32768 ; 32 * 1024

[tts]
temperature = 0.7
lsd_decode_steps = 2
top_p = 0.95
repetition_penalty = 1.1
; model_tier: TTS model to use.
; Options: 
;   tts-1        : Standard quality (fast)
;   tts-1-hd     : High definition quality (higher decoding steps)
;   tts-1-cuda    : Standard quality using GPU acceleration
;   tts-1-hd-cuda : High definition quality using GPU acceleration
model_tier = tts-1
